openapi: "3.1.1"
info:
  title: Yorozu.Api | v1
  version: 1.0.0
servers:
  - url: http://localhost:5050/
paths:
  /api/consumption-track-lists:
    get:
      tags:
        - Consumption Track Lists
      summary: Get Consumption Track Lists
      operationId: ListConsumptionTrackLists
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsumptionTrackListsResponse"
components:
  schemas:
    ConsumptionTrackListMiniResponse:
      required:
        - id
        - createdAt
        - title
        - description
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        title:
          type: string
        description:
          type:
            - "null"
            - string
    ConsumptionTrackListsResponse:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ConsumptionTrackListMiniResponse"
tags:
  - name: Consumption Track Lists
