openapi: "3.1.1"
info:
  title: Yorozu.Api | v1
  version: 1.0.0
servers:
  - url: http://localhost:5000/
paths:
  /api/content-items:
    post:
      tags:
        - Content Items
      summary: Create new content item
      operationId: CreateContentItem
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContentItemRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentItemResponse"
components:
  schemas:
    ContentItemFormat:
      enum:
        - Readable
        - Listenable
        - Mixed
        - Watchable
    ContentItemResponse:
      required:
        - id
        - createdAt
        - updatedAt
        - fullTitle
        - nickName
        - title
        - format
        - tags
        - genres
        - isSecret
        - isBookmarked
        - isFavorite
        - location
        - unitSpec
        - hasAnyTracks
        - coverImageUrl
        - placeholderColor
        - placeholderLetter
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type:
            - "null"
            - string
          format: date-time
        fullTitle:
          type: string
        nickName:
          type:
            - "null"
            - string
        title:
          type: string
        format:
          $ref: "#/components/schemas/ContentItemFormat"
        tags:
          type: array
          items:
            type: string
        genres:
          type: array
          items:
            $ref: "#/components/schemas/Genre"
        isSecret:
          type: boolean
        isBookmarked:
          type: boolean
        isFavorite:
          type: boolean
        location:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/LocationRto"
        unitSpec:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/ContentUnitSpecRto"
        hasAnyTracks:
          type: boolean
        coverImageUrl:
          type:
            - "null"
            - string
        placeholderColor:
          type: string
        placeholderLetter:
          type: string
    ContentUnitSpecRto:
      required:
        - isOngoing
        - unitType
        - totalUnits
      type: object
      properties:
        isOngoing:
          type: boolean
        unitType:
          $ref: "#/components/schemas/ContentUnitType"
        totalUnits:
          type:
            - "null"
            - integer
          format: int32
    ContentUnitType:
      enum:
        - Unknown
        - Session
        - Minute
        - Lesson
        - Volume
        - Hour
        - Chapter
        - Page
        - Track
        - Episode
        - Percent
    CreateContentItemRequest:
      required:
        - fullTitle
        - format
      type: object
      properties:
        fullTitle:
          type: string
        format:
          $ref: "#/components/schemas/ContentItemFormat"
        nickName:
          type:
            - "null"
            - string
        tags:
          type: array
          items:
            type: string
        genres:
          type: array
          items:
            $ref: "#/components/schemas/Genre"
        isSecret:
          type: boolean
        isBookmarked:
          type: boolean
        isFavorite:
          type: boolean
        coverImagePath:
          type:
            - "null"
            - string
        location:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/LocationRto"
        unitSpec:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/ContentUnitSpecRto"
    Genre:
      enum:
        - Travel
        - Shounen
        - Cyberpunk
        - Psychological
        - Isekai
        - Comedy
        - Memoir
        - Education
        - SciFi
        - Mystery
        - MagicalGirl
        - Action
        - Josei
        - Dystopian
        - History
        - Art
        - NonFiction
        - Kids
        - Philosophy
        - Historical
        - Fantasy
        - ReverseHarem
        - Crime
        - Sports
        - SliceOfLife
        - Music
        - Shoujo
        - Harem
        - Tragedy
        - TrueCrime
        - Cooking
        - Thriller
        - Drama
        - Adult
        - Biography
        - Business
        - Technology
        - Western
        - Horror
        - Mecha
        - Politics
        - Science
        - Supernatural
        - Health
        - Romance
        - CuteGirlsDoingCuteThings
        - Seinen
        - Adventure
        - SelfHelp
        - Reincarnation
    LocationRto:
      required:
        - type
        - value
      type: object
      properties:
        type:
          $ref: "#/components/schemas/LocationType"
        value:
          type: string
    LocationType:
      enum:
        - Physical
        - FilePath
        - Url
tags:
  - name: Content Items
