# https://taskfile.dev
version: "3"

tasks:
  # ---- meta ----
  meta:list:
    aliases: [default]
    desc: List all tasks
    cmds:
      - task --list-all

  # ---- app ----
  app:dev:
    aliases: [dev, d]
    desc: Start Vite dev server
    cmds:
      - bun run vite -- --host

  app:preview:
    desc: Preview production build
    cmds:
      - bun run vite -- preview --host

  app:build:only:
    desc: Build project without type checking
    cmds:
      - bun run vite -- build

  app:build:full:
    aliases: [publish]
    desc: Type-check then build project
    cmds:
      - task: quality:type-check
      - task: app:build:only

  # ---- api ----
  api:def:
    aliases: [acgd]
    desc: Download OpenAPI definition
    cmds:
      - curl -o "./src/common/api/openapi.yaml" "http://localhost:5050/openapi.yaml"

  api:gen:
    aliases: [acg]
    desc: Generate API client
    cmds:
      - bun run openapi-ts

  api:all:
    desc: Refresh API client (definition + generate)
    cmds:
      - task: api:def
      - task: api:gen

  # ---- quality ----
  quality:type-check:
    aliases: [t]
    desc: Run TypeScript type checking
    cmds:
      - bun run tsc -- -b

  quality:type-check:
    aliases: [t]
    desc: Run TypeScript type checking
    cmds:
      - npm run tsc -- -b

  quality:format:
    aliases: [f]
    desc: Run Biome to format code
    cmds:
      - npm run biome -- format --write .

  quality:lint:
    aliases: [l]
    desc: Run Biome linter (shows errors)
    cmds:
      - npm run biome -- lint .

  quality:lint:fix:
    aliases: [lf]
    desc: Run Biome linter and auto-fix issues
    cmds:
      - npm run biome -- lint --write .

  quality:check:
    aliases: [c]
    desc: Format + lint + organise imports + apply safe fixes
    cmds:
      - npm run biome -- check --write .

  # ---- test ----
  test:unit:
    desc: Run unit tests with Vitest
    cmds:
      - bun run vitest
