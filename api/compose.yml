name: yorozu

services:
  yorozu.db:
    container_name: yorozu.db
    image: postgres:16
    restart: on-failure

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: yorozu

    ports:
      - "5432:5432"

    volumes:
      - ./.containers/db:/var/lib/postgresql/data
