openapi: "3.1.1"
info:
  title: Yorozu.Api | v1
  version: 1.0.0
servers:
  - url: http://localhost:5050/
paths:
  /api/apps/hondana/home:
    get:
      tags:
        - Hondana (app)
      summary: Get Hondana Home
      operationId: GetHondanaHome
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HondanaHomeResponse"
components:
  schemas:
    ConsumptionTrackListMiniResponse:
      required:
        - id
        - createdAt
        - title
        - description
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        title:
          type: string
        description:
          type:
            - "null"
            - string
    HondanaHomeResponse:
      required:
        - consumptionTrackLists
      type: object
      properties:
        consumptionTrackLists:
          type: array
          items:
            $ref: "#/components/schemas/ConsumptionTrackListMiniResponse"
tags:
  - name: Hondana (app)
