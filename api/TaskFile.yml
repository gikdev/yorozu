# https://taskfile.dev
version: '3'

vars:
  ASPNETCORE_ENVIRONMENT: Development
  PROJECT_PATH: "./src/Yorozu.Infrastructure"
  SOLUTION_FILE_PATH: "./Yorozu.slnx"
  STARTUP_PATH: "./src/Yorozu.Api"
  PUBLISH_OUTPUT_PATH: "./publish"
  NUGET_CONFIG_FILE: "./NuGet.config"

tasks:
  default:
    desc: List all the tasks.
    cmds:
      - task --list-all

  dotnet:dev:
    aliases: [ d ]
    desc: Run the project in dev mode
    cmds:
      - dotnet run --project {{.STARTUP_PATH}} --no-restore
    requires:
      vars: [ STARTUP_PATH ]

  dotnet:restore:
    aliases: [ r ]
    desc: Restore the whole solution.
    cmds:
      - dotnet restore {{.SOLUTION_FILE_PATH}} --configfile {{.NUGET_CONFIG_FILE}}
    requires:
      vars: [ SOLUTION_FILE_PATH ]

  dotnet:format:
    aliases: [ f ]
    desc: Format the project
    cmds:
      - dotnet format {{.SOLUTION_FILE_PATH}}
    requires:
      vars: [ SOLUTION_FILE_PATH ]

  dotnet:build:
    aliases: [ b ]
    desc: Build the project
    cmds:
      - dotnet build {{.SOLUTION_FILE_PATH}} --no-restore
    requires:
      vars: [ SOLUTION_FILE_PATH ]

  dotnet:publish:
    aliases: [ p, publish ]
    desc: Publish the project
    cmds:
      - dotnet publish {{.STARTUP_PATH}} -c Release -o {{.PUBLISH_OUTPUT_PATH}} --no-restore --configfile {{.NUGET_CONFIG_FILE}}
    requires:
      vars: [ STARTUP_PATH, PUBLISH_OUTPUT_PATH, NUGET_CONFIG_FILE ]

  migration:all:
    aliases: [ m ]
    desc: Generate & run EF migrations.
    cmds:
      - task: migration:generate
      - task: migration:apply

  migration:generate:
    aliases: [ mg ]
    desc: Generate EF migrations.
    cmds:
      - dotnet ef migrations add {{.MIGRATION_NAME}} -p {{.PROJECT_PATH}} -s {{.STARTUP_PATH}} {{.CLI_ARGS}}
    requires:
      vars: [ MIGRATION_NAME, PROJECT_PATH, STARTUP_PATH ]

  migration:apply:
    aliases: [ ma ]
    desc: Run EF migrations.
    cmds:
      - dotnet ef database update -p {{.PROJECT_PATH}} -s {{.STARTUP_PATH}} {{.CLI_ARGS}}
    requires:
      vars: [ PROJECT_PATH, STARTUP_PATH ]

  docker:up:
    desc: Start all services (detached)
    cmds:
      - docker compose up -d

  db:shell:
    desc: Open psql shell inside container
    interactive: true
    cmds:
      - docker exec -it yorozu.db psql -U postgres -d yorozu
