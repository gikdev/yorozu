openapi: "3.1.1"
info:
  title: Yorozu.Api | v1
  version: 1.0.0
servers:
  - url: http://localhost:5050/
paths:
  /api/content-items:
    get:
      tags:
        - Content Items
      summary: List Content Items
      operationId: ListContentItems
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentItemsResponse"
    post:
      tags:
        - Content Items
      summary: Create Content Item
      operationId: CreateContentItem
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContentItemRequest"
        required: true
      responses:
        "204":
          description: No Content
  /api/content-items/tags:
    get:
      tags:
        - Content Items
      summary: List unique tags of content items
      operationId: ListAllContentItemTags
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAllContentItemTagsResponse"
  "/api/consumption-track-lists/{id}":
    put:
      tags:
        - Consumption Track Lists
      summary: Update Consumption Track List
      operationId: UpdateConsumptionTrackList
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConsumptionTrackListRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsumptionTrackListMiniResponse"
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    get:
      tags:
        - Consumption Track Lists
      summary: Get Consumption Track List
      operationId: GetConsumptionTrackList
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsumptionTrackListMiniResponse"
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      tags:
        - Consumption Track Lists
      summary: Delete Consumption Track List
      operationId: DeleteConsumptionTrackList
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/consumption-track-lists:
    get:
      tags:
        - Consumption Track Lists
      summary: Get Consumption Track Lists
      operationId: ListConsumptionTrackLists
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsumptionTrackListsResponse"
    post:
      tags:
        - Consumption Track Lists
      summary: Create Consumption Track List
      operationId: CreateConsumptionTrackList
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConsumptionTrackListRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsumptionTrackListMiniResponse"
components:
  schemas:
    ConsumptionTrackListMiniResponse:
      required:
        - id
        - createdAt
        - title
        - description
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        title:
          type: string
        description:
          type:
            - "null"
            - string
    ConsumptionTrackListsResponse:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ConsumptionTrackListMiniResponse"
    ContentItemFormat:
      enum:
        - Readable
        - Listenable
        - Mixed
        - Watchable
        - Interactive
    ContentItemResponse:
      required:
        - id
        - title
        - placeholderLetter
        - isSecret
        - isFavorited
        - isBookmarked
        - isOngoing
        - coverImageUrl
        - format
        - locationType
        - locationValue
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        placeholderLetter:
          type: string
        isSecret:
          type: boolean
        isFavorited:
          type: boolean
        isBookmarked:
          type: boolean
        isOngoing:
          type: boolean
        coverImageUrl:
          type:
            - "null"
            - string
        format:
          $ref: "#/components/schemas/ContentItemFormat"
        locationType:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/LocationType"
        locationValue:
          type:
            - "null"
            - string
    ContentItemsResponse:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ContentItemResponse"
    CreateConsumptionTrackListRequest:
      required:
        - title
        - description
      type: object
      properties:
        title:
          type: string
        description:
          type:
            - "null"
            - string
    CreateContentItemRequest:
      required:
        - fullTitle
        - nickName
        - tags
        - isSecret
        - isFavorited
        - isBookmarked
        - isOngoing
        - coverImageUrl
        - placeholderColor
        - format
        - locationType
        - locationValue
        - unitType
        - totalUnits
      type: object
      properties:
        fullTitle:
          type: string
        nickName:
          type:
            - "null"
            - string
        tags:
          type: array
          items:
            type: string
        isSecret:
          type: boolean
        isFavorited:
          type: boolean
        isBookmarked:
          type: boolean
        isOngoing:
          type: boolean
        coverImageUrl:
          type:
            - "null"
            - string
        placeholderColor:
          type:
            - "null"
            - string
        format:
          $ref: "#/components/schemas/ContentItemFormat"
        locationType:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/LocationType"
        locationValue:
          type:
            - "null"
            - string
        unitType:
          type: string
        totalUnits:
          type:
            - "null"
            - integer
          format: int32
    ListAllContentItemTagsResponse:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            type: string
    LocationType:
      enum:
        - Physical
        - FilePath
        - Url
        -
    ProblemDetails:
      type: object
      properties:
        type:
          type:
            - "null"
            - string
        title:
          type:
            - "null"
            - string
        status:
          type:
            - "null"
            - integer
          format: int32
        detail:
          type:
            - "null"
            - string
        instance:
          type:
            - "null"
            - string
    UpdateConsumptionTrackListRequest:
      required:
        - title
        - description
      type: object
      properties:
        title:
          type: string
        description:
          type:
            - "null"
            - string
tags:
  - name: Content Items
  - name: Consumption Track Lists
