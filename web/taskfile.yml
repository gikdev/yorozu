# https://taskfile.dev
version: "3"

vars:
  BACKEND_URL: http://localhost:5050
  OPENAPI_SPEC_PATH: ./src/common/api/openapi.yaml

tasks:
  # ---- meta ----
  meta:list:
    aliases: [default, list, l]
    desc: List all tasks
    cmds:
      - task --list-all

  # ---- app ----
  app:setup:
    aliases: [setup]
    desc: Setup the app
    cmds:
      - bun install
      - task: api:generate

  app:clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist
      - rm -rf .vite

  app:nuke:
    desc: Nuke dependencies and build artifacts
    cmds:
      - rm -rf node_modules
      - rm -rf dist
      - rm -rf .vite

  app:dev:
    aliases: [dev, d]
    desc: Start Vite dev server
    cmds:
      - bun run vite -- --host

  app:preview:
    aliases: [preview]
    desc: Preview production build
    cmds:
      - bun run vite -- preview --host

  app:build:
    aliases: [build]
    desc: Build project without type checking
    cmds:
      - bun run vite -- build

  app:build:full:
    aliases: [publish, pub]
    desc: Type-check then build project
    cmds:
      - task: quality:type-check
      - task: app:build

  # ---- api ----
  api:definition:
    aliases: [def]
    desc: Download OpenAPI definition
    cmds:
      - curl -o "{{.OPENAPI_SPEC_PATH}}" "{{.BACKEND_URL}}/openapi.yaml"

  api:generate:
    aliases: [gen]
    desc: Generate API client
    cmds:
      - bun run openapi-ts

  api:refresh:
    aliases: [api]
    desc: Refresh API client (definition + generate)
    cmds:
      - task: api:definition
      - task: api:generate

  # ---- quality ----
  quality:type-check:
    aliases: [t]
    desc: Run TypeScript type checking
    cmds:
      - bun run tsc -- -b

  quality:format:
    aliases: [f]
    desc: Run Biome to format code
    cmds:
      - npm run biome -- format --write .

  quality:lint:
    aliases: [l]
    desc: Run Biome linter (shows errors)
    cmds:
      - npm run biome -- lint .

  quality:lint:fix:
    aliases: [lf]
    desc: Run Biome linter and auto-fix issues
    cmds:
      - npm run biome -- lint --write .

  quality:check:
    aliases: [c]
    desc: Format + lint + organise imports + apply safe fixes
    cmds:
      - npm run biome -- check --write .

  # ---- test ----
  test:unit:
    aliases: [test]
    desc: Run unit tests with Vitest
    cmds:
      - bun run vitest
